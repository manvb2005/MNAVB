name: native_overlay_bridge
description: Native Android bridge for voucher overlay operations.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

flutter:
  plugin:
    platforms:
      android:
        package: com.example.native_overlay_bridge
        pluginClass: NativeOverlayBridgePlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
